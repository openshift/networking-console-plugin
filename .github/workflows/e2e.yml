name: E2E Tests

on:
  pull_request:
    branches: [main, release-*]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BRIDGE_BASE_ADDRESS: ${{ secrets.CONSOLE_URL }}
      BRIDGE_KUBEADMIN_PASSWORD: ${{ secrets.KUBEADMIN_PASSWORD }}
      BRIDGE_E2E_BROWSER_NAME: electron
      TEST_NS: ${{ secrets.TEST_NS || 'cy-test-ns' }}
      UDN_NS: udn-test-ns

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test-e2e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: cypress/gui-test-screenshots/
          retention-days: 7
