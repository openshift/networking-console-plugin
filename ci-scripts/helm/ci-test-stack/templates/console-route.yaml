apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "ci-test-stack.consoleName" . }}
  labels:
    {{- include "ci-test-stack.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "ci-test-stack.consoleName" . }}
    weight: 100
  port:
    targetPort: 9000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
